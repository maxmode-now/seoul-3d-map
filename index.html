<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City 3D — Seoul · New York in 3D</title>
    <meta name="description" content="Interactive 3D city maps of Seoul and New York built with MapLibre GL and OpenFreeMap — landmark tours, orbit camera, day/night modes, no API keys" />
  </head>
  <body>
    <div id="map"></div>

    <aside id="panel">
      <header class="panel-header">
        <h1 id="brand"></h1>
        <p class="tagline" id="tagline"></p>
      </header>

      <section class="panel-section">
        <h2>City</h2>
        <div class="btn-group" id="city-controls">
          <button data-city="seoul">Seoul</button>
          <button data-city="nyc">New York</button>
        </div>
      </section>

      <section class="panel-section">
        <h2>Landmark Tour</h2>
        <ul id="landmark-list"></ul>
      </section>

      <section class="panel-section">
        <h2>Camera</h2>
        <div class="btn-group" id="camera-controls">
          <button data-mode="free" class="active">Free</button>
          <button data-mode="orbit">Orbit</button>
          <button data-mode="top">Top-down</button>
        </div>
      </section>

      <section class="panel-section">
        <h2>Time of Day</h2>
        <div class="btn-group" id="theme-controls">
          <button data-theme="day" class="active">☀️ Day</button>
          <button data-theme="night">🌙 Night</button>
        </div>
      </section>

      <footer class="panel-footer">
        <a href="https://openfreemap.org" target="_blank" rel="noopener">OpenFreeMap</a> ·
        <a href="https://maplibre.org" target="_blank" rel="noopener">MapLibre</a> ·
        © OpenStreetMap
      </footer>
    </aside>

    <div id="info-card" class="hidden">
      <button id="card-close" aria-label="Close">×</button>
      <h3 id="card-title"></h3>
      <div id="card-chips"></div>
      <p id="card-desc"></p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
